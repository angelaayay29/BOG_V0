name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install
      - run: npm run validate

      - name: Build site
        run: npm run build
        env:
          BASE_PATH: /${{ github.event.repository.name }}/

      - name: Build print HTML for PDFs
        run: npm run build:print-html
        env:
          BASE_PATH: /${{ github.event.repository.name }}/

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Generate PDFs
        run: |
          npm run preview -- --host 127.0.0.1 --port 4173 &
          PREVIEW_URL="http://127.0.0.1:4173/${{ github.event.repository.name }}/"
          for i in $(seq 1 60); do
            curl -sf "$PREVIEW_URL" > /dev/null && break
            sleep 1
          done
          curl -sf "$PREVIEW_URL" > /dev/null || (echo "Preview server failed to start at $PREVIEW_URL" && exit 1)
          curl -sf "http://127.0.0.1:4173/${{ github.event.repository.name }}/print/sprint-24.html" > /dev/null || (echo "Print HTML not found — build:print-html may have failed" && exit 1)
          BASE_PATH=/${{ github.event.repository.name }}/ npm run generate-pdfs

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
